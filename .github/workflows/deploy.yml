name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: briccheng/briccheng.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: deploy-repo
          ref: master # default branch

      - name: Sync build output
        run: |
          find deploy-repo -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'CNAME' \
            -exec rm -rf {} +
          cp -R dist/. deploy-repo/

      - name: Commit deployment changes
        working-directory: deploy-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No deployment changes to commit."
            exit 0
          fi
          git commit -m "Deploy portfolio from source repo"
          git push origin master
